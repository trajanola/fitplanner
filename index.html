<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Treinos</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <figure>
        <img src="Academia_FitPlanner.png">
        <main id="descricao">
            <figcaption><strong>FitPlanner: A Revolução no Planejamento de Treinos</strong></figcaption>
        <figcaption>Imagine um ecossistema que pensa, adapta e evolui junto com o seu corpo. O FitPlanner não é apenas mais um aplicativo de treino ou uma planilha digital; ele é um sistema revolucionário de gestão e planejamento fitness, projetado para extinguir de vez o "achismo" das salas de musculação.
        Criado para integrar alunos, personal trainers e a gestão da academia em uma única plataforma ultra-inteligente, o FitPlanner transforma metas abstratas em caminhos matematicamente otimizados para o sucesso.</figcaption>
        </main>
    </figure>

    <div class="section">
        <h2>Adicionar Treino</h2>
        <input type="text" id="nome" placeholder="Nome do treino">
        <input type="text" id="tipo" placeholder="Tipo de treino">
        <input type="text" id="exercicios" placeholder="Exercícios (Ex: Supino: 12 repetições, Agachamento: 10 repetições)">
        <button onclick="window.adicionar_click()">Adicionar</button>
    </div>

    <div class="section">
        <h2>Listar Treinos</h2>
        <button onclick="window.listar_click()">Listar Todos</button>
    </div>

    <div class="section">
        <h2>Atualizar Treino</h2>
        <label for="treino_select">Escolha o treino para alterar:</label>
        <select id="treino_select"></select>
        <button onclick="window.carregar_treino_click()">Carregar Dados</button>
        <br><br>
        <main class="menu">
            <input type="text" id="edit_nome" placeholder="Novo nome do treino">
            <input type="text" id="edit_tipo" placeholder="Novo tipo de treino">
            <input type="text" id="edit_exercicios" placeholder="Novos exercícios">
            <button onclick="window.atualizar_click()">Salvar Alterações</button>
        </main>
    </div>

    <div class="section">
        <h2>Excluir Treino</h2>
        <label for="excluir_select">Escolha o treino para remover:</label>
        <select id="excluir_select"></select>
        <button onclick="window.excluir_click()">Excluir</button>
    </div>

    <div class="section">
        <h2>Painel de Saída</h2>
        <div id="output">Atualizações aparecerão aqui...</div>
    </div>

    <script src="app.js"></script>

    <script type="py" src="app.py"></script>

    <script>
        document.addEventListener("py:ready", function() {
            window.atualizarDropdowns();
        });
    </script>
</body>
</html>
